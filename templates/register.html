<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ro'yxatdan o'tish - Auto World</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet">
    <style>body { font-family: 'Plus Jakarta Sans', sans-serif; }</style>
</head>
<body class="bg-gray-900 text-white min-h-screen flex flex-col">
    <nav class="bg-gray-800/50 border-b border-gray-700 p-6">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <a href="index.html" class="text-3xl font-800 uppercase italic tracking-tighter">Auto<span class="text-orange-500">World</span></a>
        </div>
    </nav>
    <div class="flex-grow flex items-center justify-center px-4">

            <h2 class="text-3xl font-800 uppercase italic mb-8 text-center text-orange-500">Ro'yxatdan o'tish</h2>
            <form class="space-y-5">
                <input type="text" placeholder="Ismingiz" class="w-full bg-gray-900 border border-gray-700 rounded-xl px-5 py-3.5 outline-none focus:border-orange-500 transition text-white">
                <input type="email" placeholder="Email" class="w-full bg-gray-900 border border-gray-700 rounded-xl px-5 py-3.5 outline-none focus:border-orange-500 transition text-white">
                <input type="password" placeholder="Parol yaratish" class="w-full bg-gray-900 border border-gray-700 rounded-xl px-5 py-3.5 outline-none focus:border-orange-500 transition text-white">
                <button class="w-full bg-orange-500 text-black font-800 py-4 rounded-xl uppercase tracking-widest hover:bg-orange-600 transition mt-4">Klubga qo'shilish</button>
            </form>
            <p class="text-center mt-6 text-gray-500 text-sm">Hisobingiz bormi? <a href="login.html" class="text-orange-500 font-bold">Kirish</a></p>
        </div>
    </div>

<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auto World - Premium Avtomobillar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet">
    <style>body { font-family: 'Plus Jakarta Sans', sans-serif; }</style>
</head>
<body class="bg-gray-900 text-white">
    <nav class="bg-gray-800/50 backdrop-blur-lg sticky top-0 z-50 border-b border-gray-700">
        <div class="max-w-7xl mx-auto px-4 h-20 flex justify-between items-center">
            <a href="/" class="text-3xl font-800 uppercase italic tracking-tighter">Auto<span class="text-orange-500">World</span></a>
            <div class="hidden md:flex space-x-10 font-bold uppercase text-xs tracking-widest">
                <a href="/" class="hover:text-orange-500 transition">Katalog</a>
                <a href="/about" class="hover:text-orange-500 transition">Xizmatlar</a>
                <a href="/contact" class="hover:text-orange-500 transition">Bog'lanish</a>
            </div>
            <a href="/login" class="bg-orange-500 text-black px-8 py-3 rounded-md font-800 uppercase text-xs hover:bg-orange-600 transition">Test Drive</a>
        </div>
    </nav>
    <main>{% block body %}{% endblock %}</main>
    <footer class="bg-black py-12 mt-20 text-center border-t border-gray-800">
        <p class="text-gray-500 text-sm italic">&copy; 2026 Auto World. Premium Cars & Service.</p>
    </footer>
</body>
</html>

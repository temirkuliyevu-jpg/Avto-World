{% extends "base.html" %}
{% block body %}
<div class="max-w-7xl mx-auto px-6 py-20">
    <h1 class="text-5xl font-800 uppercase italic border-l-8 border-orange-500 pl-6 mb-12">Bog'lanish</h1>
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-12 bg-gray-800/50 p-12 rounded-[2rem] border border-gray-700 shadow-2xl">
        <div class="space-y-6">
            <h2 class="text-2xl font-bold text-orange-500 italic">Bizga xabar qoldiring</h2>
            <p class="text-gray-400">Mutaxassislarimiz 24 soat ichida siz bilan bog'lanishadi.</p>
        </div>
        <form class="space-y-4">
            <input type="text" placeholder="Ism" class="w-full bg-gray-900 border border-gray-700 rounded-xl px-6 py-4 outline-none focus:border-orange-500">
            <textarea placeholder="Xabar" rows="4" class="w-full bg-gray-900 border border-gray-700 rounded-xl px-6 py-4 outline-none focus:border-orange-500"></textarea>
            <button class="bg-orange-500 text-black font-800 px-10 py-4 rounded-xl uppercase tracking-widest hover:bg-orange-600 transition">Yuborish</button>
        </form>
    </div>
</div>
{% endblock %}
